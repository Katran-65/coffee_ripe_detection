# coffee_dataset.yaml
path: datas # корневая директория датасета
train: yolo_train  # относительный путь к train изображениям (от path)
val: yolo_valid    # относительный путь к valid изображениям
test: yolo_test    # относительный путь к test изображениям

# Количество классов
nc: 6

# Имена классов (должны совпадать с порядком в class_to_id)
names: ['fruit', 'dry', 'overripe', 'ripe', 'semi_ripe', 'unripe']

# Важно: В вашем JSON есть суперкатегория 'fruit' и подкатегории
# Возможно, вам нужно использовать только 5 классов (исключив 'fruit' как общую категорию)
